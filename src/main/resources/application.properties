server.port=8081

# MySQL connection — credentials must be supplied via environment variables
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/banking_db}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger UI — restricted to dev/test profiles via SecurityConfig
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.operations-sorter=method

# Security — credentials from environment; no defaults in production
spring.security.user.name=${API_USERNAME:admin}
spring.security.user.password=${API_PASSWORD:}

# CORS — comma-separated allowed origins
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:3000}
